<!DOCTYPE html>
<html>
<head>
    <title>Student Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: lightgray;
        }
    </style>
</head>
<body>

<h2>Student Details</h2>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Branch</th>
            <th>Marks</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>Abhi</td>
            <td>CSE</td>
            <td>85</td>
        </tr>
        <tr>
            <td>Rahul</td>
            <td>ECE</td>
            <td>90</td>
        </tr>
        <tr>
            <td>Neha</td>
            <td>IT</td>
            <td>88</td>
        </tr>
    </tbody>

</table>

</body>
</html>
